<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<style>
body{
  font-family:Arial;
  background:#111;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.box{
  text-align:center;
}
button{
  padding:10px 20px;
  border:none;
  background:red;
  color:white;
  border-radius:10px;
}
</style>
</head>
<body>

<div class="box">
  <h1>Welcome to Dashboard 🚀</h1>
  <button onclick="logout()">Logout</button>
</div>

<script>
if(!localStorage.getItem("token")){
  window.location.href = "/";
}

function logout(){
  localStorage.removeItem("token");
  window.location.href = "/";
}
</script>

</body>
</html>
